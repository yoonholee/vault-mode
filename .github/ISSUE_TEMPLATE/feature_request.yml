name: Feature request
description: Suggest a small Vault Mode improvement.
title: "[feature] "
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is painful or missing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Vault Mode do?
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example
      description: Small note snippet, command flow, or UI sketch.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Existing extension, script, or workflow you tried.
    validations:
      required: false
