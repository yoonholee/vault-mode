name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx @vscode/vsce package
      - run: |
          gh release create "$GITHUB_REF_NAME" *.vsix --title "$GITHUB_REF_NAME" \
            --notes "See CHANGELOG.md. Cursor/VSCodium can install the attached .vsix directly."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
